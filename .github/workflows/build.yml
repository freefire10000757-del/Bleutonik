name: Build Hack .tronel APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'main.py'
      - 'buildozer.spec'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v4
    
    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: 📦 Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          python3-pip \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          libtinfo5 \
          cmake \
          libffi-dev \
          libssl-dev \
          wget \
          curl
    
    - name: 📦 Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install buildozer cython
    
    - name: 🤖 Build Android APK
      run: |
        export BUILDOZER_WARN_ON_ROOT=0
        buildozer android debug 2>&1 | tee build.log
    
    - name: 📤 Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: HackTronel-APK
        path: bin/*.apk
    
    - name: 🏷️ Create Release
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        name: "Hack .tronel v1.0.0"
        tag_name: "v1.0.0"
        body: |
          ## Hack .tronel v1.0.0
          
          ### 📱 Android APK
          - تغيير خلفية الجهاز
          - واجهة Kivy كاملة
          - لا تشفير - آمن تماماً
          
          ### ⚠️ ملاحظة
          للاختبارات المصرح بها فقط
          
          ### 🔧 كيفية التثبيت
          1. حمل الـ APK من الأسفل
          2. فعّل "تثبيت من مصادر غير معروفة"
          3. افتح التطبيق
        files: bin/*.apk
    
    - name: 📊 Upload Build Log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
